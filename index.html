<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discord Forms</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div id="brand-icon" class="brand-icon">DF</div>
        <div>
          <h1>Discord Forms</h1>
          <p>Public forms website and admin studio</p>
        </div>
      </div>

      <button id="new-form-button" class="primary-button full-width">New Form</button>

      <section class="sidebar-section">
        <div class="sidebar-heading">Your Forms</div>
        <div id="forms-list" class="forms-list"></div>
      </section>

      <section class="sidebar-section sidebar-note">
        <div class="sidebar-heading">How It Works</div>
        <p>Create forms, share the public homepage or direct form links, and use the admin tools to moderate and deploy updates.</p>
      </section>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div>
          <div id="route-badge" class="route-badge">Dashboard</div>
          <h2 id="page-title">Forms Dashboard</h2>
        </div>
        <div id="topbar-actions" class="topbar-actions"></div>
      </header>

      <section id="page-content" class="page-content"></section>
    </main>
  </div>

  <template id="empty-state-template">
    <section class="hero-card">
      <div class="hero-copy">
        <span class="hero-chip">Discord-style Form Studio</span>
        <h3>Build a forms website people can actually open and use.</h3>
        <p>Create forms, moderate visitors, review activity, and publish the live site from one control center.</p>
        <button class="primary-button" data-action="create-first-form">Create First Form</button>
      </div>
      <div class="hero-preview">
        <div class="message-card">
          <div class="message-avatar"></div>
          <div>
            <div class="message-name">Forms Bot</div>
            <div class="message-body">New response received in <strong>#event-signup</strong></div>
          </div>
        </div>
      </div>
    </section>
  </template>

  <input id="pdf-import-input" type="file" accept="application/pdf" hidden>
  <script src="app.js"></script>
</body>
</html>
